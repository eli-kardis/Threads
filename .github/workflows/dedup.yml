name: Dedup Notion Pages

on:
  workflow_dispatch:

jobs:
  dedup:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Dedup Script
        working-directory: scripts
        env:
          NOTION_SECRET: ${{ secrets.NOTION_SECRET }}
          NOTION_DB: ${{ secrets.NOTION_DB_PRIMARY }}
        run: node sync/dedup-pages.mjs
